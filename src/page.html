<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🧟‍♂️Zombie Fight🧠</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="1000" height="700" tabindex="0"></canvas>
    <div class="game-ui">
        <div class="stats">
            <div class="score">🎯 <span id="uiScore">0</span></div>
            <div class="best">🏆 BEST: <span id="uiBest">0</span></div>
        </div>
        <div class="hint">
            🔫 CLICK TO SHOOT &nbsp;&nbsp;|&nbsp;&nbsp; 🎮 WASD / arrows
        </div>
        <div class="volume-control">
            <span>🔊</span>
            <input type="range" id="volumeSlider" min="0" max="100" value="70">
            <span class="volume-value" id="volumeValue">70%</span>
        </div>
        <div class="gameover-panel" id="gameoverPanel">
            <h1>GAME OVER</h1>
            <div class="final-score">FINAL SCORE: <span id="finalScoreSpan">0</span></div>
            <div class="best-score">🏆 RECORD: <span id="finalBestSpan">0</span></div>
            <button class="restart-btn" id="restartButton">▶ RESTART</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
